services:
  - type: web
    name: culo-server
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: redis
      # Set REDIS_URL only in Render Dashboard (Environment), not in git
      - key: REDIS_URL
        sync: false
